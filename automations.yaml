- id: '1738842459652'
  alias: Parents Fan Temp Controller
  description: Automation to control the fan speed based on the master bedroom temperature
  triggers:
  - entity_id: sensor.master_bedroom_temperature
    trigger: state
  conditions:
  - condition: device
    device_id: 270ba07ee9c531c776784183e5c91018
    domain: fan
    entity_id: e5464bbe4cd995f400528a88eb26274f
    type: is_on
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.master_bedroom_temperature
        below: 20.9
      sequence:
      - target:
          device_id: 270ba07ee9c531c776784183e5c91018
        action: fan.turn_off
        data: {}
    - conditions:
      - condition: numeric_state
        entity_id: sensor.master_bedroom_temperature
        above: 20.8
        below: 23.9
      sequence:
      - data:
          percentage: 16.666666
        target:
          device_id: 270ba07ee9c531c776784183e5c91018
        action: fan.set_percentage
    - conditions:
      - condition: numeric_state
        entity_id: sensor.master_bedroom_temperature
        above: 23.8
        below: 25.9
      sequence:
      - data:
          percentage: 33.333333
        target:
          device_id: 270ba07ee9c531c776784183e5c91018
        action: fan.set_percentage
    - conditions:
      - condition: numeric_state
        entity_id: sensor.master_bedroom_temperature
        above: 25.8
        below: 27.9
      sequence:
      - data:
          percentage: 50
        target:
          device_id: 270ba07ee9c531c776784183e5c91018
        action: fan.set_percentage
    - conditions:
      - condition: numeric_state
        entity_id: sensor.master_bedroom_temperature
        above: 27.8
        below: 29.9
      sequence:
      - data:
          percentage: 66.666667
        target:
          device_id: 270ba07ee9c531c776784183e5c91018
        action: fan.set_percentage
    - conditions:
      - condition: numeric_state
        entity_id: sensor.master_bedroom_temperature
        above: 29.8
        below: 31.9
      sequence:
      - data:
          percentage: 83.333333
        target:
          device_id: 270ba07ee9c531c776784183e5c91018
        action: fan.set_percentage
    - conditions:
      - condition: numeric_state
        entity_id: sensor.master_bedroom_temperature
        above: 31.8
      sequence:
      - data:
          percentage: 100
        target:
          device_id: 270ba07ee9c531c776784183e5c91018
        action: fan.set_percentage
  mode: single
